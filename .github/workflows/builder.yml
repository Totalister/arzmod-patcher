name: Build APK Patch

on:
  workflow_dispatch:
    inputs:
      flags:
        description: "Опции: -arzmod -x64 -fullarm -actual -rodina"
        required: false
        default: "-arzmod -actual"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout patcher
        uses: actions/checkout@v4

      - name: Setup Java (openjdk-21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Android SDK build-tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y android-sdk

      - name: Install apktool 2.6.1
        run: |
          sudo wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.6.1/apktool_2.6.1.jar \
            -O /usr/local/lib/apktool.jar
          echo '#!/bin/bash' | sudo tee /usr/local/bin/apktool
          echo 'java -jar /usr/local/lib/apktool.jar "$@"' | sudo tee -a /usr/local/bin/apktool
          sudo chmod +x /usr/local/bin/apktool
          apktool --version

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Place keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > key/gitbuild.jks

      - name: Patch config.py
        run: |
          cat << 'EOF' > config.py
          build_download=False
          build_sign=True
          key_name = "gitbuild.jks"
          key_password="arzmod_gitbuild"
          EOF

      - name: Run patcher
        run: |
          python main.py ${{ github.event.inputs.flags }}

      - name: Upload patched APK
        uses: actions/upload-artifact@v4
        with:
          name: patched-apk
          path: "*.apk"
          retention-days: 7